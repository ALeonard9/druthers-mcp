fail_fast: true
default_stages: [pre-commit]   # existing hooks run per-commit; tests run pre-push (below)

# pre-commit.ci (hosted app) keeps hook versions current and auto-fixes on PRs.
# Skip hooks that need the local project venv — they can't run in the hosted CI.
ci:
  autoupdate_schedule: weekly
  skip: [pylint, pytest-changed]

repos:
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.30.1
    hooks:
      - id: gitleaks
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: check-yaml
      - id: end-of-file-fixer
      - id: trailing-whitespace
      - id: debug-statements
      - id: check-added-large-files
        args: [--maxkb=200]
      - id: double-quote-string-fixer
      - id: mixed-line-ending
      - id: no-commit-to-branch
  - repo: https://github.com/psf/black
    rev: 24.10.0
    hooks:
      - id: black
        args: [--skip-string-normalization]
  - repo: local
    hooks:
      - id: pylint
        name: pylint
        entry: ./.venv/bin/pylint
        language: system
        types: [python]
        args: [--disable=too-few-public-methods]
      # Tests run at PRE-PUSH (not per-commit) and only for what changed
      # (testmon maps coverage -> affected tests). CI runs the full suite.
      - id: pytest-changed
        name: pytest (changed only, pre-push)
        entry: ./.venv/bin/pytest --testmon -q
        language: system
        stages: [pre-push]
        pass_filenames: false
        always_run: true
